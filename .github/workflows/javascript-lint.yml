name: JavaScript Lint

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "latest"
          registry-url: "https://registry.npmjs.org"

      - name: Install modules
        run: |
          cd javascript
          npm install

      - name: Lint
        run: |
          cd javascript
          npm run check

      - name: Build
        run: |
          cd javascript
          npm run build

      - name: Check package.json is committed
        run: |
          if ! git diff --exit-code -- javascript/package.json; then
            echo "package.json is out of date. Run 'npm run build' and commit the result."
            exit 1
          fi

      - name: Test
        run: |
          cd javascript
          npm run test
