name: Python Lint
on:
  workflow_call:
jobs:
  openapi-compatibility-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: python tools/validate_openapi_compatibility.py server/openapi.json codegen/lib-openapi.json
