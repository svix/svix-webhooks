name: Python Lint
on:
  workflow_call:
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        name: Install Python
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          cd python
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt .
          python -m pip install -r requirements-dev.txt .

      - name: Run linting
        run: |
          cd python
          sh ./scripts/lint.sh
