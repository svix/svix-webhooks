name: Rust Lint

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: rust

jobs:
  check-fmt:
    name: Check formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: rustfmt
        run: cargo fmt -- --check

  check-unused-deps:
    name: Check for unused dependencies
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: taiki-e/install-action@cargo-machete

      - run: cargo machete

  test-versions:
    name: Rust Lint
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        # bump this when bumping the MSRV
        rust: ["1.88.0", stable, beta]
    steps:
      - uses: actions/checkout@v6

      - name: Regen openapi libs
        run: ../regen_openapi.py

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          # only save the cache on the main branch
          # cf https://github.com/Swatinem/rust-cache/issues/95
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # include relevant information in the cache name
          prefix-key: "rust-client-${{ matrix.rust }}"

      - uses: taiki-e/install-action@nextest

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo nextest run

      - name: Run tests with http 0.2 support
        run: cargo nextest run --features http02

      - name: Run tests with all features
        run: cargo nextest run --all-features

      - name: Run tests with native-tls
        run: cargo nextest run --no-default-features --features=http1,http2,native-tls
